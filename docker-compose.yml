services:
  app:
    build: .
    image: epstein-archive:14.2.0
    container_name: epstein-archive
    restart: unless-stopped
    labels:
      - 'app.version=14.2.0'
    ports:
      - '3012:3012'
    depends_on:
      - db
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - API_PORT=3012
      - DATABASE_URL=postgresql://${POSTGRES_USER:-epstein}:${POSTGRES_PASSWORD:-epstein}@db:5432/${POSTGRES_DB:-epstein_archive}
      - LOG_LEVEL=info
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET must be set}
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3012/api/stats/health/ready',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: epstein-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-epstein}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-epstein}
      - POSTGRES_DB=${POSTGRES_DB:-epstein_archive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-configs/epstein.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: '512mb'
    ports:
      - '5435:5432'
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-epstein} -d ${POSTGRES_DB:-epstein_archive}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
