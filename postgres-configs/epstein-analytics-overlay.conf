# epstein-analytics-overlay.conf
# ═══════════════════════════════════════════════════════════════════════════════
# Aggressive Analytics OPTIONAL overlay for Epstein Archive
# ═══════════════════════════════════════════════════════════════════════════════
#
# PRECONDITION (HARD): apiPool.max MUST be ≤ 10 before activating this overlay.
#
# work_mem blowup math:
#   Safe Stability:     apiPool=18 × max_parallel_workers_per_gather=2 × 16MB  =  576 MB  ✅
#   Aggressive overlay: apiPool=10 × max_parallel_workers_per_gather=3 × 64MB  = 1.92 GB  ✅
#   Aggressive WRONG:   apiPool=18 × max_parallel_workers_per_gather=3 × 64MB  = 3.46 GB  💀 OOM
#
# To activate:
#   1. Reduce API_POOL_MAX=10 in env / connection.ts POOL_SIZES.api
#   2. Add to docker-compose db command:
#        postgres -c config_file=/etc/postgresql/postgresql.conf
#               -c include_if_exists=/etc/postgresql/epstein-analytics-overlay.conf
#   3. Mount this file into the container:
#        - ./postgres-configs/epstein-analytics-overlay.conf:/etc/postgresql/epstein-analytics-overlay.conf:ro
#   4. Restart db container
#   5. Verify: SHOW work_mem;  -- must show 64MB
#              SHOW max_parallel_workers_per_gather;  -- must show 3
#
# To revert: remove the include from docker-compose command, restart db.
# ═══════════════════════════════════════════════════════════════════════════════

# Only override delta values below. All other settings inherit from epstein.conf.

work_mem                          = 64MB     # raise ONLY with apiPool.max ≤ 10
max_parallel_workers_per_gather   = 3        # use 3 of 6 CPUs per gather node (restart required)
effective_io_concurrency          = 200      # more aggressive parallel I/O
autovacuum_vacuum_cost_delay      = 2ms      # faster autovacuum; more IO
log_min_duration_statement        = 500      # log queries > 500ms (tighter than Safe 1000ms)
