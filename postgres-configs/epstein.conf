# Postgres 16 — Epstein Archive v14.2.0
# Host: Linode · AMD EPYC 7713 · 6 vCPU · 16 GB RAM · NVMe SSD
# Profile: SAFE STABILITY (default)
#
# Profile B (Aggressive Analytics) values are listed as comments —
# only activate if apiPool.max is reduced to ≤ 10.
# work_mem blowup formula: apiPool.max × max_parallel_workers_per_gather × work_mem
#   Safe:       20 × 2 × 16MB  =  640 MB  ✅
#   Aggressive: 10 × 3 × 64MB  = 1.92 GB  ✅ (only with reduced pool)
#
# Requires PG restart: shared_buffers, max_connections, jit,
#   max_parallel_workers*, max_worker_processes, shared_preload_libraries

# ── Network ────────────────────────────────────────────────────────────────────
listen_addresses           = '*'        # Allow connections from Docker host

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers             = 4GB        # 25% of 16 GB (restart required)
effective_cache_size       = 10GB       # planner hint; ~62% RAM available to OS
work_mem                   = 16MB       # global safe floor — do NOT raise globally
                                        # maintenancePool overrides per-session:
                                        #   SET LOCAL work_mem = '256MB';
maintenance_work_mem       = 1GB        # VACUUM, CREATE INDEX, ALTER TABLE
temp_buffers               = 16MB

wal_buffers                = 64MB       # explicit (avoids auto-calc under-sizing)

# ── WAL + Checkpointing ───────────────────────────────────────────────────────
checkpoint_timeout         = 10min
min_wal_size               = 512MB
max_wal_size               = 2GB
checkpoint_completion_target = 0.9

# ── Planner — NVMe ────────────────────────────────────────────────────────────
random_page_cost           = 1.1        # NVMe: random ≈ sequential
seq_page_cost              = 1.0
effective_io_concurrency   = 150        # NVMe parallel I/O
                                        # Profile B: 200

# ── Parallelism (6 vCPU) ─────────────────────────────────────────────────────
max_parallel_workers_per_gather = 2     # restart required; Profile B: 3
max_parallel_workers            = 4     # restart required
max_worker_processes            = 8     # restart required
parallel_tuple_cost             = 0.1

# ── JIT ───────────────────────────────────────────────────────────────────────
jit                        = off        # restart required
                                        # Our queries target < 300ms; JIT adds 10-50ms
                                        # overhead and only helps queries > 1s.

# ── Connections ───────────────────────────────────────────────────────────────
# Budget (1 instance, ingest on same host):
#   apiPool=20 + maintenancePool=3 + ingestPool=10 + PG internal≈5 + headroom=12 = 50
max_connections             = 80        # restart required; comfortable ceiling
idle_in_transaction_session_timeout = 10000    # 10s: abort stalled transactions
tcp_keepalives_idle         = 60
tcp_keepalives_interval     = 10
tcp_keepalives_count        = 6

# ── Statement timeouts (server-side backstop) ─────────────────────────────────
statement_timeout           = 10000     # 10s absolute; pools enforce lower (8s API, 60s ingest)
lock_timeout                = 5000      # 5s: fail fast on DDL contention

# ── Autovacuum ────────────────────────────────────────────────────────────────
# Tuned for heavy-ingest tables (entities, documents, entity_mentions)
# Per-table overrides applied via migration 1740014300000_refresh_log:
#   entities/entity_relationships: scale_factor=0.005
#   documents/entity_mentions: scale_factor=0.01
autovacuum                          = on
autovacuum_naptime                  = 15s
autovacuum_vacuum_scale_factor      = 0.01      # 1% dead tuples (global default)
autovacuum_analyze_scale_factor     = 0.005     # 0.5% changed → analyze
autovacuum_vacuum_cost_delay        = 5ms       # Profile B: 2ms
autovacuum_vacuum_cost_limit        = 400       # default 200; faster vacuum, bounded IO
autovacuum_max_workers              = 3

# ── Logging ───────────────────────────────────────────────────────────────────
log_min_duration_statement   = 1000             # log queries > 1s; Profile B: 500
log_line_prefix              = '%t [%p] %u@%d %a '
log_checkpoints              = on
log_autovacuum_min_duration  = 500              # log slow autovacuums
log_lock_waits               = on
log_temp_files               = 0                # log ALL temp file spills (planner regressions)
track_io_timing              = on               # accurate EXPLAIN BUFFERS I/O
track_activity_query_size    = 4096

# ── pg_stat_statements ────────────────────────────────────────────────────────
shared_preload_libraries     = 'pg_stat_statements'     # restart required
pg_stat_statements.track     = all
pg_stat_statements.max       = 10000

# ── Timezone ──────────────────────────────────────────────────────────────────
timezone                     = 'UTC'

# ── Shared memory ─────────────────────────────────────────────────────────────
# Docker container must have shm_size: '256mb' in docker-compose.yml
# (prevents VACUUM "No space left on device" on /dev/shm)
